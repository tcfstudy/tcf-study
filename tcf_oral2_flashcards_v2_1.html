const freqStars = f => ['','⭐','⭐⭐','⭐⭐⭐','⭐⭐⭐⭐','⭐⭐⭐⭐⭐'][f] || '';

let cards = [...ALL];
let current = 0;
let seen = new Set();
let revealed = false;

function render() {
  const c = cards[current];
  document.getElementById('cardTag').textContent = c.tag;
  document.getElementById('cardFreq').textContent = freqStars(c.freq);
  document.getElementById('cardZh').textContent = c.zh;
  const frEl = document.getElementById('cardFr');
  frEl.textContent = c.fr;
  frEl.classList.add('hidden');
  document.getElementById('hint').style.display = 'block';
  revealed = false;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + cards.length;
  seen.add(current);
  updateIndex();
  updateStats();
}

function toggleAnswer() {
  const frEl = document.getElementById('cardFr');
  const hint = document.getElementById('hint');
  if (!revealed) {
    frEl.classList.remove('hidden');
    hint.style.display = 'none';
    revealed = true;
  } else {
    frEl.classList.add('hidden');
    hint.style.display = 'block';
    revealed = false;
  }
}

function nextCard() { if (current < cards.length-1) { current++; render(); } }
function prevCard() { if (current > 0) { current--; render(); } }

function updateStats() {
  document.getElementById('statSeen').textContent = seen.size;
  document.getElementById('statTotal').textContent = cards.length;
  document.getElementById('statPct').textContent = Math.round(seen.size/cards.length*100)+'%';
}

function buildIndex() {
  const bar = document.getElementById('indexBar');
  bar.innerHTML = '';
  cards.forEach((_,i) => {
    const btn = document.createElement('button');
    btn.className = 'idx-btn'+(i===current?' current':'')+(seen.has(i)?' seen':'');
    btn.textContent = i+1;
    btn.onclick = () => { current=i; render(); };
    bar.appendChild(btn);
  });
}

function updateIndex() {
  document.querySelectorAll('.idx-btn').forEach((btn,i) => {
    btn.className = 'idx-btn'+(i===current?' current':'')+(seen.has(i)?' seen':'');
  });
}

document.getElementById('shuffleBtn').addEventListener('click', () => {
  cards = [...ALL].sort(()=>Math.random()-0.5);
  current=0; seen=new Set(); revealed=false;
  render(); buildIndex();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  cards=[...ALL]; current=0; seen=new Set(); revealed=false;
  render(); buildIndex();
});

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') nextCard();
  if (e.key==='ArrowLeft') prevCard();
  if (e.key===' ') { e.preventDefault(); toggleAnswer(); }
});

render();
buildIndex();
updateStats();
</script>
