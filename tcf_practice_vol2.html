<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF 口语练习 Vol.2</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#f0ede6;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px 60px}

.header{text-align:center;margin-bottom:24px}
.header h1{font-family:"Fraunces",serif;font-size:22px;font-weight:300;color:#1a1a1a;margin-bottom:4px}
.header .sub{font-size:11px;color:#aaa;font-weight:300;letter-spacing:.06em}

.mode-wrap{width:100%;max-width:580px;margin-bottom:14px}
.mode-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.mode-btn{padding:5px 11px;border-radius:6px;border:1px solid #ddd8d0;background:#fff;font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;color:#888;cursor:pointer;transition:all .1s;white-space:nowrap}
.mode-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

.progress-wrap{width:100%;max-width:580px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.bar{flex:1;height:2px;background:#ddd8d0;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:#1a1a1a;border-radius:2px;transition:width .4s ease}
.prog-label{font-size:11px;color:#bbb;white-space:nowrap}

.card{width:100%;max-width:580px;background:#fff;border-radius:16px;border:1px solid #e4dfd6;overflow:hidden}

.step1{padding:44px 44px 36px;text-align:center;cursor:pointer;transition:background .1s;border-bottom:1px solid #f5f2ee}
.step1:hover{background:#fdfcfa}
.cat-tag{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#c0b49a;margin-bottom:10px}
.zh-word{font-family:"Fraunces",serif;font-size:30px;font-weight:300;color:#1a1a1a;line-height:1.3}
.tap-hint{font-size:11px;color:#ccc;font-weight:300;letter-spacing:.06em;margin-top:14px}

.step2{display:none}
.step2.show{display:block}

.fr-section{padding:22px 36px 18px;border-bottom:1px solid #f5f2ee}
.fr-main{font-family:"Fraunces",serif;font-size:19px;font-weight:300;color:#1a1a1a;line-height:1.5;margin-bottom:4px}
.fr-zh{font-size:12px;color:#b09070;font-weight:400}

.prompt-section{padding:18px 36px;border-bottom:1px solid #f5f2ee;background:#faf8f4}
.prompt-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#c0b49a;margin-bottom:8px}
.prompt-zh{font-size:15px;color:#1a1a1a;line-height:1.65;font-weight:400}
.prompt-sub{font-size:11px;color:#bbb;margin-top:5px;font-weight:300}

.ref-section{overflow:hidden;max-height:0;transition:max-height .4s ease,padding .4s ease;padding:0 36px}
.ref-section.show{max-height:600px;padding:20px 36px;border-top:1px solid #f5f2ee}
.ref-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#5a9a7a;margin-bottom:14px}
.ref-ex{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0ede6}
.ref-ex:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.ref-fr{font-size:13px;font-style:italic;color:#1a1a1a;line-height:1.75;margin-bottom:3px}
.ref-zh{font-size:11px;color:#aaa;line-height:1.5;font-weight:300}

/* highlight colors — 5 distinct ones */
.hl0{background:#fff0c8;color:#7a5800;border-radius:3px;padding:1px 4px;font-style:normal;font-weight:500}
.hl1{background:#d4f0e4;color:#1a6640;border-radius:3px;padding:1px 4px;font-style:normal;font-weight:500}
.hl2{background:#dce8ff;color:#1a3a8a;border-radius:3px;padding:1px 4px;font-style:normal;font-weight:500}
.hl3{background:#fce0f0;color:#8a1a58;border-radius:3px;padding:1px 4px;font-style:normal;font-weight:500}
.hl4{background:#e8deff;color:#4a1a8a;border-radius:3px;padding:1px 4px;font-style:normal;font-weight:500}

.btn-row{padding:14px 20px;display:flex;gap:8px;border-top:1px solid #f0ede6}
.btn{flex:1;padding:11px;border-radius:8px;border:1px solid #e4dfd6;background:#fff;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:400;color:#3a3a3a;cursor:pointer;transition:all .1s;text-align:center}
.btn:hover{background:#f5f2ee;border-color:#ccc}
.btn:active{transform:scale(.97)}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.btn-primary:hover{background:#333;border-color:#333}
.btn-ref{background:#eef7f3;color:#2a7a5a;border-color:#c5e8d8;font-weight:500}
.btn-ref:hover{background:#dff0e8}

.done{display:none;flex-direction:column;align-items:center;gap:16px;text-align:center;max-width:580px;margin-top:40px}
.done.show{display:flex}
.done-title{font-family:"Fraunces",serif;font-size:36px;font-weight:300;color:#1a1a1a}
.done-sub{font-size:13px;color:#aaa;font-weight:300}
.btn-restart{padding:12px 36px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-restart:hover{background:#333}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <h1>TCF 口语练习 Vol.2</h1>
  <div class="sub">看中文 · 想法语 · 翻译例句 · 看三句参考</div>
</div>

<div class="mode-wrap">
  <div class="mode-row" id="modeRow">
    <button class="mode-btn active" onclick="setMode('全部',this)">全部随机</button>
    <button class="mode-btn" onclick="setMode('表达观点',this)">表达观点</button>
    <button class="mode-btn" onclick="setMode('引入论点',this)">引入论点</button>
    <button class="mode-btn" onclick="setMode('举例说明',this)">举例说明</button>
    <button class="mode-btn" onclick="setMode('强调程度',this)">强调程度</button>
    <button class="mode-btn" onclick="setMode('表达对比',this)">表达对比</button>
    <button class="mode-btn" onclick="setMode('结果后果',this)">结果后果</button>
    <button class="mode-btn" onclick="setMode('让步辩证',this)">让步辩证</button>
    <button class="mode-btn" onclick="setMode('可能建议',this)">可能建议</button>
    <button class="mode-btn" onclick="setMode('条件假设',this)">条件假设</button>
    <button class="mode-btn" onclick="setMode('趋势变化',this)">趋势变化</button>
    <button class="mode-btn" onclick="setMode('人际社会',this)">人际社会</button>
    <button class="mode-btn" onclick="setMode('职业成功',this)">职业成功</button>
    <button class="mode-btn" onclick="setMode('责任担当',this)">责任担当</button>
    <button class="mode-btn" onclick="setMode('文化身份',this)">文化身份</button>
    <button class="mode-btn" onclick="setMode('教育学习',this)">教育学习</button>
    <button class="mode-btn" onclick="setMode('科技现代',this)">科技现代</button>
    <button class="mode-btn" onclick="setMode('总结收尾',this)">总结收尾</button>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="bar"><div class="bar-fill" id="barFill"></div></div>
  <div class="prog-label" id="progLabel"></div>
</div>

<div class="card" id="mainCard">
  <div class="step1" id="step1" onclick="showFr()">
    <div class="cat-tag" id="catTag"></div>
    <div class="zh-word" id="zhWord"></div>
    <div class="tap-hint">在脑子里想法语，想好了再点</div>
  </div>

  <div class="step2" id="step2">
    <div class="fr-section">
      <div class="fr-main" id="frMain"></div>
      <div class="fr-zh" id="frZh"></div>
    </div>
    <div class="prompt-section">
      <div class="prompt-label">🎯 试着翻译这句话</div>
      <div class="prompt-zh" id="promptZh"></div>
      <div class="prompt-sub">说出来，不用完美，用上刚才的词组就行</div>
    </div>
    <div class="ref-section" id="refSection">
      <div class="ref-label">✓ 观点库参考例句（3句）</div>
      <div class="ref-ex">
        <div class="ref-fr" id="ref1f"></div>
        <div class="ref-zh" id="ref1z"></div>
      </div>
      <div class="ref-ex">
        <div class="ref-fr" id="ref2f"></div>
        <div class="ref-zh" id="ref2z"></div>
      </div>
      <div class="ref-ex">
        <div class="ref-fr" id="ref3f"></div>
        <div class="ref-zh" id="ref3z"></div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="mainBtn" onclick="showFr()">我想好了，看法语</button>
  </div>
</div>

<div class="done" id="doneScreen">
  <div class="done-title">完成！</div>
  <div class="done-sub" id="doneSub"></div>
  <button class="btn-restart" onclick="restart()">再来一轮</button>
</div>

<script>
var CARDS = [
{"zh":"在我看来……","fr":"À mon avis / Selon moi","cat":"表达观点","ex1f":"À mon avis, les appareils électroniques présentent de nombreux avantages pour l'apprentissage.","ex1z":"在我看来，电子设备在学习方面有很多优点。","ex2f":"Selon moi, il est indispensable de trouver un équilibre entre vie professionnelle et vie personnelle.","ex2z":"在我看来，在职业生活和个人生活之间找到平衡是不可或缺的。","ex3f":"À mon avis, la famille reste le pilier le plus important dans la vie d'une personne.","ex3z":"在我看来，家庭仍然是一个人生命中最重要的支柱。","hls":["À mon avis","Selon moi"]},
{"zh":"我坚信……","fr":"Je suis convaincu(e) que...","cat":"表达观点","ex1f":"Je suis convaincu que les actions simples ont un effet réel sur l'environnement.","ex1z":"我坚信简单的行动对环境真的有影响。","ex2f":"Je suis convaincue que l'éducation est la clé pour réduire les inégalités sociales.","ex2z":"我坚信教育是减少社会不平等的关键。","ex3f":"Je suis convaincu qu'apprendre une langue étrangère change la façon dont on voit le monde.","ex3z":"我坚信学习一门外语会改变人看世界的方式。","hls":["Je suis convaincu","Je suis convaincue"]},
{"zh":"我个人认为……","fr":"Personnellement, je pense que / je trouve que","cat":"表达观点","ex1f":"Personnellement, je pense que vivre à l'étranger est une expérience qui transforme vraiment.","ex1z":"我个人认为，在国外生活是一种真正改变人的经历。","ex2f":"Personnellement, je trouve que les réseaux sociaux ont plus d'effets négatifs que positifs.","ex2z":"我个人觉得，社交媒体的负面影响多于正面影响。","ex3f":"Personnellement, je crois qu'il faut laisser les enfants faire des erreurs pour qu'ils apprennent.","ex3z":"我个人认为，应该让孩子犯错误，这样他们才能学习。","hls":["Personnellement"]},
{"zh":"说实话……","fr":"À vrai dire / Pour être honnête","cat":"表达观点","ex1f":"À vrai dire, je ne suis pas totalement convaincu par cet argument.","ex1z":"说实话，我并不完全被这个论点说服。","ex2f":"Pour être honnête, je pense que la situation est plus complexe qu'elle n'y paraît.","ex2z":"说实话，我认为情况比看起来复杂得多。","ex3f":"À vrai dire, j'ai du mal à imaginer ma vie sans technologie.","ex3z":"说实话，我很难想象没有科技的生活。","hls":["À vrai dire","Pour être honnête"]},
{"zh":"毫无疑问……","fr":"Il est indéniable que / Il est évident que","cat":"表达观点","ex1f":"Il est indéniable que la technologie a transformé notre façon de travailler.","ex1z":"毫无疑问，科技改变了我们的工作方式。","ex2f":"Il est évident que l'éducation joue un rôle fondamental dans le développement d'une société.","ex2z":"显而易见，教育在社会发展中发挥着根本性的作用。","ex3f":"Il est indéniable que les voyages élargissent les horizons.","ex3z":"毫无疑问，旅行拓宽了视野。","hls":["Il est indéniable que","Il est évident que"]},
{"zh":"首先，有必要指出……","fr":"Il convient de noter que / Il faut souligner que","cat":"引入论点","ex1f":"Il convient de noter que les résultats varient selon les individus.","ex1z":"有必要指出，结果因人而异。","ex2f":"Il faut souligner que cette situation touche surtout les jeunes générations.","ex2z":"必须强调，这种情况主要影响年轻一代。","ex3f":"Il convient de noter que les inégalités persistent malgré les progrès réalisés.","ex3z":"有必要指出，尽管取得了进步，不平等现象仍然存在。","hls":["Il convient de noter","Il faut souligner"]},
{"zh":"与此同时……","fr":"Par ailleurs / De surcroît","cat":"引入论点","ex1f":"Par ailleurs, il ne faut pas négliger l'impact psychologique de cette situation.","ex1z":"与此同时，不应忽视这种情况的心理影响。","ex2f":"De surcroît, les coûts associés à cette solution sont souvent sous-estimés.","ex2z":"此外，与这一解决方案相关的成本往往被低估。","ex3f":"Par ailleurs, certaines études montrent que l'exercice physique améliore les performances scolaires.","ex3z":"此外，一些研究表明，体育锻炼能提高学业成绩。","hls":["Par ailleurs","De surcroît"]},
{"zh":"退一步来说……","fr":"Certes... mais / Il faut nuancer","cat":"引入论点","ex1f":"Certes, les réseaux sociaux permettent de rester connecté, mais ils peuvent aussi créer de l'isolement.","ex1z":"固然，社交媒体让人保持联系，但它也可能造成孤立。","ex2f":"Il faut nuancer : tous les enfants ne réagissent pas de la même façon face aux écrans.","ex2z":"需要辩证看待：不是所有孩子对屏幕的反应都一样。","ex3f":"Certes, travailler à l'étranger offre des opportunités, mais cela implique aussi des sacrifices.","ex3z":"固然，在国外工作提供了机会，但也意味着牺牲。","hls":["Certes","Il faut nuancer"]},
{"zh":"这正好说明了……","fr":"C'est notamment le cas de / C'est l'exemple de","cat":"举例说明","ex1f":"C'est notamment le cas des jeunes qui apprennent l'anglais grâce aux séries américaines.","ex1z":"这正好是年轻人通过美剧学英语的情况。","ex2f":"C'est l'exemple parfait d'une politique qui a eu des effets inattendus.","ex2z":"这正好是一项产生意外效果的政策的例子。","ex3f":"C'est notamment le cas dans les pays nordiques, où l'équilibre travail-vie personnelle est très valorisé.","ex3z":"北欧国家就是如此，那里的工作与生活平衡非常受重视。","hls":["C'est notamment le cas","C'est l'exemple"]},
{"zh":"以我自己为例……","fr":"Pour ma part / En ce qui me concerne","cat":"举例说明","ex1f":"Pour ma part, j'ai remarqué que lire des livres en français a vraiment amélioré mon vocabulaire.","ex1z":"就我而言，我注意到读法语书真的改善了我的词汇量。","ex2f":"En ce qui me concerne, j'ai toujours pensé que voyager seul était la meilleure façon de se connaître.","ex2z":"就我而言，我一直认为独自旅行是了解自己的最好方式。","ex3f":"Pour ma part, je pense que la passion est plus importante que le diplôme.","ex3z":"就我而言，我认为热情比文凭更重要。","hls":["Pour ma part","En ce qui me concerne"]},
{"zh":"不难想象……","fr":"On peut facilement imaginer que / Il n'est pas difficile de voir que","cat":"举例说明","ex1f":"On peut facilement imaginer que cette situation crée beaucoup de stress pour les familles concernées.","ex1z":"不难想象，这种情况给相关家庭带来了很大的压力。","ex2f":"Il n'est pas difficile de voir que les inégalités économiques influencent les résultats scolaires.","ex2z":"不难看出，经济不平等影响着学业成绩。","ex3f":"On peut facilement imaginer les conséquences d'un manque d'éducation sur le long terme.","ex3z":"不难想象，长期缺乏教育的后果。","hls":["On peut facilement imaginer","Il n'est pas difficile de voir"]},
{"zh":"越来越……（动词）","fr":"aller en augmentant / ne cesse de + 动词原形","cat":"强调程度","ex1f":"Le nombre de personnes qui travaillent à distance ne cesse d'augmenter.","ex1z":"远程工作的人数不断增加。","ex2f":"La pression sur les jeunes diplômés ne cesse de croître.","ex2z":"对年轻毕业生的压力不断增长。","ex3f":"Les inégalités entre riches et pauvres vont en augmentant dans de nombreux pays.","ex3z":"在许多国家，贫富差距不断扩大。","hls":["ne cesse de","vont en augmentant"]},
{"zh":"远不止……","fr":"bien plus que / bien au-delà de","cat":"强调程度","ex1f":"L'impact des réseaux sociaux va bien au-delà de la simple communication.","ex1z":"社交媒体的影响远不止简单的沟通。","ex2f":"Les bénéfices de l'exercice physique sont bien plus importants qu'on ne le pense.","ex2z":"体育锻炼的好处远比人们想象的重要。","ex3f":"Cette question est bien plus complexe qu'il n'y paraît.","ex3z":"这个问题远比看起来复杂得多。","hls":["bien plus","bien au-delà de"]},
{"zh":"不可忽视的是……","fr":"Il ne faut pas négliger / Il serait naïf d'ignorer","cat":"强调程度","ex1f":"Il ne faut pas négliger l'importance du soutien familial dans la réussite scolaire.","ex1z":"不可忽视家庭支持在学业成功中的重要性。","ex2f":"Il serait naïf d'ignorer que les conditions économiques jouent un rôle majeur.","ex2z":"忽视经济条件发挥重要作用是天真的。","ex3f":"Il ne faut pas négliger les effets à long terme de cette politique.","ex3z":"不可忽视这项政策的长期影响。","hls":["Il ne faut pas négliger","Il serait naïf d'ignorer"]},
{"zh":"虽然……但是……","fr":"Bien que + 虚拟式 / Même si + 直陈式","cat":"表达对比","ex1f":"Bien que la technologie facilite notre vie, elle crée aussi de nouvelles dépendances.","ex1z":"虽然科技让我们的生活更便利，但它也带来了新的依赖。","ex2f":"Même si les diplômes restent importants, l'expérience pratique est de plus en plus valorisée.","ex2z":"即使学历仍然重要，实践经验也越来越受重视。","ex3f":"Bien qu'il soit difficile de changer ses habitudes, c'est souvent nécessaire.","ex3z":"虽然改变习惯很困难，但这往往是必要的。","hls":["Bien que","Même si","Bien qu'"]},
{"zh":"与……形成对比","fr":"En revanche / À l'inverse / Contrairement à","cat":"表达对比","ex1f":"En revanche, vivre à la campagne offre un cadre de vie bien plus calme et naturel.","ex1z":"相比之下，住在乡村提供了一个更加平静自然的生活环境。","ex2f":"À l'inverse, certains pays ont choisi de réduire le temps de travail hebdomadaire.","ex2z":"相反，一些国家选择减少每周工作时间。","ex3f":"Contrairement aux idées reçues, les personnes âgées s'adaptent souvent très bien aux nouvelles technologies.","ex3z":"与普遍认知相反，老年人通常能很好地适应新技术。","hls":["En revanche","À l'inverse","Contrairement à"]},
{"zh":"一方面……另一方面……","fr":"D'une part... d'autre part / D'un côté... de l'autre","cat":"表达对比","ex1f":"D'une part, le télétravail offre plus de flexibilité. D'autre part, il peut créer un sentiment d'isolement.","ex1z":"一方面，远程办公提供了更多灵活性。另一方面，它可能带来孤立感。","ex2f":"D'un côté, vivre en ville offre de nombreuses opportunités. De l'autre, le rythme y est souvent épuisant.","ex2z":"一方面，城市生活提供了很多机会。另一方面，节奏往往令人筋疲力尽。","ex3f":"D'une part, la mondialisation a créé de la richesse. D'autre part, elle a aussi accentué les inégalités.","ex3z":"一方面，全球化创造了财富。另一方面，它也加剧了不平等。","hls":["D'une part","d'autre part","D'un côté","de l'autre"]},
{"zh":"由此可见……","fr":"On voit donc que / Il en résulte que / Il s'ensuit que","cat":"结果后果","ex1f":"On voit donc que l'accès à l'éducation reste inégal selon les milieux sociaux.","ex1z":"由此可见，受教育机会根据社会背景仍然不平等。","ex2f":"Il en résulte que beaucoup de jeunes se retrouvent sans emploi stable.","ex2z":"由此产生的结果是，很多年轻人没有稳定的工作。","ex3f":"On voit donc que la solution n'est pas simple et nécessite une approche globale.","ex3z":"由此可见，解决方案并不简单，需要全面的方法。","hls":["On voit donc que","Il en résulte que","Il s'ensuit que"]},

var COLORS = ["hl0","hl1","hl2","hl3","hl4"];
var mode="全部", queue=[], cur=0, stage=0;

function setMode(m,el){
  mode=m;
  document.querySelectorAll(".mode-btn").forEach(function(b){b.classList.remove("active")});
  el.classList.add("active");
  restart();
}

function buildQueue(){
  var pool = mode==="全部" ? CARDS.slice() : CARDS.filter(function(c){return c.cat===mode});
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t}
  return pool;
}

function highlight(text, hls){
  if(!hls||!hls.length) return text;
  hls.forEach(function(hl, idx){
    var cls = COLORS[idx % COLORS.length];
    var escaped = hl.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    var re = new RegExp("("+escaped+")","g");
    text = text.replace(re, '<span class="'+cls+'">$1</span>');
  });
  return text;
}

function render(){
  if(cur>=queue.length){showDone();return}
  stage=0;
  var c=queue[cur];

  document.getElementById("catTag").textContent=c.cat;
  document.getElementById("zhWord").textContent=c.zh;
  document.getElementById("frMain").textContent=c.fr;
  document.getElementById("frZh").textContent=c.zh;
  document.getElementById("promptZh").textContent=c.ex1z;

  document.getElementById("ref1f").innerHTML=highlight(c.ex1f,c.hls);
  document.getElementById("ref1z").textContent=c.ex1z;
  document.getElementById("ref2f").innerHTML=highlight(c.ex2f,c.hls);
  document.getElementById("ref2z").textContent=c.ex2z;
  document.getElementById("ref3f").innerHTML=highlight(c.ex3f,c.hls);
  document.getElementById("ref3z").textContent=c.ex3z;

  document.getElementById("step1").style.cursor="pointer";
  document.getElementById("step1").onclick=showFr;
  document.getElementById("step2").classList.remove("show");
  document.getElementById("refSection").classList.remove("show");

  var btn=document.getElementById("mainBtn");
  btn.textContent="我想好了，看法语";
  btn.className="btn btn-primary";
  btn.onclick=showFr;

  document.getElementById("barFill").style.width=(cur/queue.length*100).toFixed(0)+"%";
  document.getElementById("progLabel").textContent=(cur+1)+" / "+queue.length;
  document.getElementById("mainCard").classList.remove("hidden");
  document.getElementById("progressWrap").classList.remove("hidden");
  document.getElementById("doneScreen").classList.remove("show");
}

function showFr(){
  if(stage!==0)return;
  stage=1;
  document.getElementById("step2").classList.add("show");
  document.getElementById("step1").style.cursor="default";
  document.getElementById("step1").onclick=null;
  var btn=document.getElementById("mainBtn");
  btn.textContent="看三句参考例句";
  btn.className="btn btn-ref";
  btn.onclick=showRef;
}

function showRef(){
  if(stage!==1)return;
  stage=2;
  document.getElementById("refSection").classList.add("show");
  var btn=document.getElementById("mainBtn");
  btn.textContent="下一张 →";
  btn.className="btn btn-primary";
  btn.onclick=next;
}

function next(){cur++;render()}

function showDone(){
  document.getElementById("mainCard").classList.add("hidden");
  document.getElementById("progressWrap").classList.add("hidden");
  document.getElementById("doneSub").textContent="完成了 "+queue.length+" 张，今天练习结束";
  document.getElementById("doneScreen").classList.add("show");
}

function restart(){
  queue=buildQueue();cur=0;
  document.getElementById("mainCard").classList.remove("hidden");
  document.getElementById("progressWrap").classList.remove("hidden");
  document.getElementById("doneScreen").classList.remove("show");
  render();
}

restart();
</script>
