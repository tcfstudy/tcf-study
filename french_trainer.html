<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法语口语训练器</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD4;
  --text: #1A1814;
  --text2: #6B6760;
  --text3: #9E9B96;
  --blue-bg: #EBF2FF; --blue-txt: #1A3A7A; --blue-acc: #3366CC;
  --teal-bg: #E4F5EE; --teal-txt: #0D4F38; --teal-acc: #1A8C5F;
  --amber-bg: #FEF3E2; --amber-txt: #6B3D00; --amber-acc: #D4820A;
  --purple-bg: #F0EEFF; --purple-txt: #3B2080; --purple-acc: #6B48E8;
  --coral-bg: #FFF0EC; --coral-txt: #7A2B18; --coral-acc: #D95030;
  --green-bg: #ECFAE5; --green-txt: #1E4D0A; --green-acc: #3D9420;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* Header */
.header{text-align:center;margin-bottom:2rem;padding-top:1rem}
.header-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--text);margin-bottom:4px}
.header-sub{font-size:13px;color:var(--text3);letter-spacing:.04em}

/* Nav */
.nav{display:flex;gap:6px;margin-bottom:1.5rem;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .2s}
.nb.on{background:var(--text);color:white;border-color:var(--text)}
.nb:hover:not(.on){background:var(--surface2)}

/* Screens */
.screen{display:none}.screen.on{display:block}

/* Section titles */
.sec-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:1.5rem 0 .75rem;padding-left:2px}

/* ========= FLIP CARDS ========= */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:.5rem}
@media(max-width:420px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
.flip-wrap{height:100px;perspective:600px;cursor:pointer}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;border-radius:var(--radius);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;padding:12px 14px;border:1.5px solid var(--border)}
.flip-front{background:var(--surface)}
.flip-back{transform:rotateY(180deg);font-size:12px;line-height:1.55}
.flip-word{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3}
.flip-zh{font-size:12px;color:var(--text3)}
.flip-num{position:absolute;top:8px;right:10px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.flip-ex{font-style:italic;color:inherit}
.flip-hint{font-size:10px;opacity:.7;margin-top:6px}

/* Color variants for flip cards */
.fc-blue .flip-front{background:var(--blue-bg);border-color:#B8CEEE}
.fc-blue .flip-back{background:var(--blue-bg);border-color:#B8CEEE;color:var(--blue-txt)}
.fc-blue .flip-word{color:var(--blue-txt)}.fc-blue .flip-zh{color:var(--blue-acc)}.fc-blue .flip-num{background:#D0E4FF;color:var(--blue-txt)}
.fc-teal .flip-front{background:var(--teal-bg);border-color:#A8D9C2}
.fc-teal .flip-back{background:var(--teal-bg);border-color:#A8D9C2;color:var(--teal-txt)}
.fc-teal .flip-word{color:var(--teal-txt)}.fc-teal .flip-zh{color:var(--teal-acc)}.fc-teal .flip-num{background:#C0EDD8;color:var(--teal-txt)}
.fc-amber .flip-front{background:var(--amber-bg);border-color:#F0C97A}
.fc-amber .flip-back{background:var(--amber-bg);border-color:#F0C97A;color:var(--amber-txt)}
.fc-amber .flip-word{color:var(--amber-txt)}.fc-amber .flip-zh{color:var(--amber-acc)}.fc-amber .flip-num{background:#FFE5AB;color:var(--amber-txt)}
.fc-purple .flip-front{background:var(--purple-bg);border-color:#C8B8F8}
.fc-purple .flip-back{background:var(--purple-bg);border-color:#C8B8F8;color:var(--purple-txt)}
.fc-purple .flip-word{color:var(--purple-txt)}.fc-purple .flip-zh{color:var(--purple-acc)}.fc-purple .flip-num{background:#DDD4FF;color:var(--purple-txt)}
.fc-coral .flip-front{background:var(--coral-bg);border-color:#F2B8A8}
.fc-coral .flip-back{background:var(--coral-bg);border-color:#F2B8A8;color:var(--coral-txt)}
.fc-coral .flip-word{color:var(--coral-txt)}.fc-coral .flip-zh{color:var(--coral-acc)}.fc-coral .flip-num{background:#FFD8CE;color:var(--coral-txt)}
.fc-green .flip-front{background:var(--green-bg);border-color:#A8D890}
.fc-green .flip-back{background:var(--green-bg);border-color:#A8D890;color:var(--green-txt)}
.fc-green .flip-word{color:var(--green-txt)}.fc-green .flip-zh{color:var(--green-acc)}.fc-green .flip-num{background:#C8EDB8;color:var(--green-txt)}
.fc-gray .flip-front{background:var(--surface2);border-color:var(--border)}
.fc-gray .flip-back{background:var(--surface2);border-color:var(--border);color:var(--text2)}
.fc-gray .flip-word{color:var(--text)}.fc-gray .flip-zh{color:var(--text3)}.fc-gray .flip-num{background:var(--border);color:var(--text2)}

/* ========= SKELETON ========= */
.skel-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;overflow:hidden}
.skel-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.1rem;cursor:pointer}
.skel-head-left{display:flex;align-items:center;gap:10px}
.skel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.skel-label{font-size:14px;font-weight:600;color:var(--text)}
.skel-sub{font-size:12px;color:var(--text3);margin-top:1px}
.skel-chev{font-size:18px;color:var(--text3);transition:transform .25s}
.skel-card.open .skel-chev{transform:rotate(180deg)}
.skel-body{display:none;padding:0 1.1rem 1rem}
.skel-card.open .skel-body{display:block}
.skel-frame{font-size:14px;line-height:1.8;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:8px;font-style:italic}
.skel-divider{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin:1rem 0 .5rem;opacity:.6}
.skel-ex{font-size:13px;line-height:1.7;padding:9px 12px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);margin-bottom:6px;border-left:3px solid var(--border)}

/* ========= PRACTICE (fill/recall) ========= */
.prog-bar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:1.25rem}
.prog-fill{height:100%;background:var(--text);border-radius:2px;transition:width .3s}
.pcard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.topic-tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;margin-bottom:1rem;letter-spacing:.03em}
.question{font-size:16px;font-weight:500;line-height:1.55;margin-bottom:1rem;color:var(--text)}
.hint-txt{font-size:13px;color:var(--text3);margin-bottom:.875rem}
textarea{width:100%;min-height:90px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface2);resize:vertical;outline:none;transition:border .2s}
textarea:focus{border-color:#888}
.fill-sent{font-size:16px;line-height:2.2;color:var(--text);margin-bottom:.75rem}
input.blank-in{font-size:15px;border:none;border-bottom:2px solid var(--text);background:transparent;color:var(--blue-acc);width:110px;outline:none;font-family:'DM Sans',sans-serif;padding:0 4px}
input.blank-in:focus{border-bottom-color:var(--blue-acc)}
.btn-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
button.btn{padding:9px 18px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);font-weight:500;transition:all .15s}
button.btn:hover{background:var(--surface2)}
button.btn:active{transform:scale(.97)}
button.btn.pri{background:var(--text);color:white;border-color:var(--text)}
button.btn.pri:hover{opacity:.88}
.fb-box{font-size:13px;margin-top:.75rem;padding:8px 14px;border-radius:var(--radius-sm);display:none}
.fb-box.on{display:block}
.fb-box.ok{background:var(--green-bg);color:var(--green-txt)}
.fb-box.no{background:var(--amber-bg);color:var(--amber-txt)}
.rev-box{display:none;margin-top:1rem;padding:.875rem 1.1rem;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid var(--teal-acc)}
.rev-box.on{display:block}
.rev-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.5rem}
.rev-text{font-size:15px;line-height:1.75;color:var(--text)}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem}
.counter{font-size:13px;color:var(--text3)}

/* ========= EXAM ========= */
.exam-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.exam-num{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem}
.exam-topic{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:1rem;line-height:1.3}
.points-list{margin:0 0 1rem;padding:0}
.point-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:.6rem}
.point-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);margin-top:.45em;flex-shrink:0}
.point-text{font-size:14px;color:var(--text2);line-height:1.6}
.point-text strong{color:var(--text);font-weight:600}
.exam-rev{display:none;margin-top:1rem;padding:.875rem 1.1rem;border-radius:var(--radius-sm)}
.exam-rev.on{display:block}

/* Color accent bars for exam cards */
.exam-card.ec-blue{border-left:4px solid var(--blue-acc)}
.exam-card.ec-teal{border-left:4px solid var(--teal-acc)}
.exam-card.ec-purple{border-left:4px solid var(--purple-acc)}
.exam-card.ec-coral{border-left:4px solid var(--coral-acc)}
.exam-card.ec-amber{border-left:4px solid var(--amber-acc)}
.exam-card.ec-green{border-left:4px solid var(--green-acc)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">Mon entraîneur oral</div>
    <div class="header-sub">法语口语表达系统训练</div>
  </div>

  <div class="nav">
    <button class="nb on" onclick="go('pieces',this)">零件库</button>
    <button class="nb" onclick="go('skeleton',this)">大骨架</button>
    <button class="nb" onclick="go('fill',this)">填空</button>
    <button class="nb" onclick="go('recall',this)">回忆</button>
    <button class="nb" onclick="go('exam',this)">考试</button>
  </div>

  <!-- PIECES -->
  <div id="s-pieces" class="screen on">
    <div class="sec-title">情感 &amp; 状态词组</div>
    <div class="cards-grid" id="cg-emotion"></div>
    <div class="sec-title">时间 &amp; 变化词组</div>
    <div class="cards-grid" id="cg-time"></div>
    <div class="sec-title">举例 &amp; 个人引入</div>
    <div class="cards-grid" id="cg-example"></div>
    <div class="sec-title">程度 &amp; 修饰副词</div>
    <div class="cards-grid" id="cg-degree"></div>
    <div class="sec-title">连接 &amp; 转折词组</div>
    <div class="cards-grid" id="cg-link"></div>
    <div class="sec-title">高频名词词组</div>
    <div class="cards-grid" id="cg-nouns"></div>
    <div class="sec-title">核心单词（按频率）</div>
    <div class="cards-grid" id="cg-words"></div>
  </div>

  <!-- SKELETON -->
  <div id="s-skeleton" class="screen">
    <div id="skel-list"></div>
  </div>

  <!-- FILL -->
  <div id="s-fill" class="screen">
    <div class="prog-bar"><div class="prog-fill" id="fill-prog" style="width:0%"></div></div>
    <div id="fill-content"></div>
  </div>

  <!-- RECALL -->
  <div id="s-recall" class="screen">
    <div class="prog-bar"><div class="prog-fill" id="recall-prog" style="width:0%"></div></div>
    <div id="recall-content"></div>
  </div>

  <!-- EXAM -->
  <div id="s-exam" class="screen">
    <div id="exam-content"></div>
  </div>
</div>

<script>
const pieces = {
  emotion:[
    {w:"se sentir seul(e)",c:"blue",zh:"感到孤独",freq:8,ex:"Au début, on peut se sentir seul dans un nouvel environnement."},
    {w:"se sentir rassuré(e)",c:"teal",zh:"感到安心",freq:7,ex:"Quand la famille est là, on se sent souvent rassuré."},
    {w:"se sentir à l'aise",c:"teal",zh:"感到自在",freq:6,ex:"Parler la langue aide à se sentir plus à l'aise."},
    {w:"le mal du pays",c:"coral",zh:"思乡",freq:5,ex:"Surtout le soir, on peut avoir le mal du pays."},
    {w:"être stressé(e)",c:"coral",zh:"感到压力/紧张",freq:7,ex:"Commencer une nouvelle vie peut être très stressant."},
    {w:"être motivé(e)",c:"green",zh:"有动力",freq:6,ex:"Quand on aime son travail, on est souvent plus motivé."},
    {w:"être irritable",c:"amber",zh:"变得烦躁",freq:4,ex:"Ils deviennent parfois irritables quand on leur demande d'arrêter."},
    {w:"se débrouiller",c:"purple",zh:"自己搞定/应对",freq:5,ex:"Quand on est seul, on doit apprendre à se débrouiller tout seul."},
    {w:"se sentir isolé(e)",c:"coral",zh:"感到孤立",freq:4,ex:"Certaines personnes peuvent se sentir isolées à la campagne."},
    {w:"être rassurant(e)",c:"teal",zh:"令人安心的",freq:4,ex:"Voyager avec quelqu'un est beaucoup plus rassurant."},
  ],
  time:[
    {w:"petit à petit",c:"green",zh:"慢慢地",freq:9,ex:"Petit à petit, on apprend à être plus indépendant."},
    {w:"au début",c:"blue",zh:"一开始",freq:9,ex:"Au début, ce n'est pas toujours facile."},
    {w:"de plus en plus",c:"amber",zh:"越来越……",freq:8,ex:"On voit de plus en plus de personnes qui réussissent sans diplôme."},
    {w:"sur le long terme",c:"purple",zh:"从长远来看",freq:6,ex:"Il est difficile de progresser sur le long terme sans motivation."},
    {w:"progressivement",c:"teal",zh:"逐渐地",freq:5,ex:"Les habitudes changent progressivement dans la société."},
    {w:"pendant des années",c:"gray",zh:"多年来",freq:5,ex:"Certaines personnes pratiquent pendant des années."},
    {w:"à la dernière minute",c:"amber",zh:"在最后一刻",freq:3,ex:"On peut changer de plan à la dernière minute."},
    {w:"depuis la crise sanitaire",c:"gray",zh:"自疫情以来",freq:3,ex:"Depuis la crise sanitaire, beaucoup d'entreprises ont découvert le télétravail."},
  ],
  example:[
    {w:"personnellement",c:"teal",zh:"就我个人而言",freq:15,ex:"Personnellement, je pense que la technologie peut vraiment aider."},
    {w:"par exemple",c:"blue",zh:"比如",freq:14,ex:"Par exemple, certains apprennent l'anglais grâce à des séries."},
    {w:"honnêtement",c:"coral",zh:"说实话",freq:7,ex:"Honnêtement, je trouve que c'est assez vrai."},
    {w:"franchement",c:"coral",zh:"坦率地说",freq:5,ex:"Franchement, je ne suis pas très favorable aux écrans pour les enfants."},
    {w:"j'ai déjà vu",c:"purple",zh:"我曾经见过",freq:4,ex:"J'ai déjà vu une jeune femme qui avait créé son entreprise."},
    {w:"certains de mes amis",c:"purple",zh:"我有些朋友",freq:4,ex:"Certains de mes amis vivent dans une maison achetée par leurs parents."},
    {w:"dans certains cas",c:"gray",zh:"在某些情况下",freq:4,ex:"Dans certains cas, cela peut même améliorer la qualité de vie."},
    {w:"comme … (ville/pays)",c:"blue",zh:"像……这样的城市/国家",freq:8,ex:"Dans une ville multiculturelle comme Toronto, on voit des festivals."},
  ],
  degree:[
    {w:"vraiment",c:"blue",zh:"真的/确实",freq:10,ex:"La technologie peut vraiment aider les gens à apprendre."},
    {w:"surtout",c:"purple",zh:"尤其是",freq:10,ex:"Surtout le soir, on peut avoir le mal du pays."},
    {w:"souvent",c:"gray",zh:"经常",freq:12,ex:"Les personnes âgées ont souvent travaillé pendant de nombreuses années."},
    {w:"parfois",c:"gray",zh:"有时候",freq:10,ex:"Cela peut parfois créer des petits conflits ou du stress."},
    {w:"beaucoup plus + adj",c:"teal",zh:"……得多",freq:8,ex:"On est beaucoup plus libre quand on est seul."},
    {w:"encore plus",c:"amber",zh:"更加……",freq:6,ex:"Les problèmes financiers rendent la situation encore plus difficile."},
    {w:"assez + adj",c:"green",zh:"相当……",freq:5,ex:"La solitude peut être assez difficile à gérer."},
    {w:"constamment",c:"amber",zh:"不断地/持续地",freq:4,ex:"Les jeunes sont constamment en contact avec des langues étrangères."},
  ],
  link:[
    {w:"en plus",c:"blue",zh:"另外/而且",freq:11,ex:"En plus, les appareils rendent l'apprentissage plus interactif."},
    {w:"ensuite",c:"blue",zh:"其次/接着",freq:9,ex:"Ensuite, je pense qu'il est aussi plus compliqué d'organiser la vie."},
    {w:"cependant",c:"amber",zh:"然而",freq:5,ex:"Cependant, il est important de respecter les habitudes locales."},
    {w:"contrairement à",c:"coral",zh:"与……相反",freq:4,ex:"Contrairement à la famille, les amis sont des personnes qu'on choisit."},
    {w:"alors que",c:"coral",zh:"而……却/尽管",freq:5,ex:"En Chine on partage les plats, alors qu'au Canada on préfère son assiette."},
    {w:"donc",c:"green",zh:"因此",freq:10,ex:"Donc, certaines familles doivent travailler beaucoup."},
    {w:"c'est pourquoi",c:"green",zh:"这就是为什么",freq:5,ex:"C'est pourquoi je pense que le modèle hybride est l'avenir."},
    {w:"même si",c:"purple",zh:"即使",freq:5,ex:"Même si ces amis vivent loin, ils peuvent très bien se comprendre."},
    {w:"pourtant",c:"amber",zh:"然而/可是",freq:4,ex:"Pourtant, la nature peut avoir un effet très positif sur la santé."},
    {w:"d'un autre côté",c:"gray",zh:"另一方面",freq:5,ex:"D'un autre côté, vivre à la campagne peut offrir un environnement calme."},
    {w:"d'abord … ensuite … enfin",c:"blue",zh:"首先…其次…最后",freq:9,ex:"D'abord, [point1]. Ensuite, [point2]. Enfin, [conclusion]."},
  ],
  nouns:[
    {w:"la vie quotidienne",c:"teal",zh:"日常生活",freq:11,ex:"Cela peut aider dans la vie quotidienne à se sentir plus intégré."},
    {w:"le bien-être",c:"green",zh:"幸福感/身心健康",freq:5,ex:"Le bien-être mental est très important pour les personnes âgées."},
    {w:"l'identité",c:"purple",zh:"身份认同",freq:5,ex:"Les traditions font partie de notre identité."},
    {w:"l'équilibre",c:"teal",zh:"平衡",freq:7,ex:"Le plus important est de trouver un équilibre entre les deux cultures."},
    {w:"la qualité de vie",c:"green",zh:"生活质量",freq:6,ex:"Le télétravail peut améliorer la qualité de vie."},
    {w:"le soutien émotionnel",c:"blue",zh:"情感支持",freq:4,ex:"La famille peut apporter du soutien émotionnel pendant l'adaptation."},
    {w:"l'environnement",c:"green",zh:"环境",freq:8,ex:"Il est difficile de s'adapter à un nouvel environnement."},
    {w:"les habitudes",c:"amber",zh:"习惯",freq:8,ex:"Il faut faire des efforts pour s'adapter aux habitudes locales."},
    {w:"la société",c:"gray",zh:"社会",freq:7,ex:"Le sentiment d'être utile dans la société est très important."},
    {w:"l'expérience",c:"purple",zh:"经历/经验",freq:7,ex:"Cette expérience peut beaucoup faire grandir une personne."},
    {w:"les compétences",c:"blue",zh:"技能/能力",freq:4,ex:"Ils développent leurs compétences pendant des années."},

function go(s, btn){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById('s-'+s).classList.add('on');
  btn.classList.add('on');
  if(s==='fill') renderFill();
  else if(s==='recall') renderRecall();
  else if(s==='exam') renderExam();
  else if(s==='skeleton') renderSkel();
  else if(s==='pieces') renderPieces();
}

function renderPieces(){
  Object.keys(pieces).forEach(cat=>{
    const el=document.getElementById('cg-'+cat);
    if(!el)return;
    const sorted=[...pieces[cat]].sort((a,b)=>b.freq-a.freq);
    el.innerHTML=sorted.map((p,i)=>`
      <div class="flip-wrap fc-${p.c}" onclick="this.classList.toggle('flipped')">
        <div class="flip-inner">
          <div class="flip-front">
            <span class="flip-num">${p.freq}×</span>
            <div class="flip-word">${p.w}</div>
            <div class="flip-zh">${p.zh}</div>
          </div>
          <div class="flip-back">
            <div class="flip-ex">${p.ex}</div>
            <div class="flip-hint">← 点击翻回</div>
          </div>
        </div>
      </div>`).join('');
  });
}

function renderSkel(){
  document.getElementById('skel-list').innerHTML=skeletons.map((sk,i)=>`
    <div class="skel-card" id="sc-${i}">
      <div class="skel-head" onclick="toggleSkel(${i})">
        <div class="skel-head-left">
          <div class="skel-dot" style="background:${sk.acc}"></div>
          <div><div class="skel-label">${sk.label}</div><div class="skel-sub">${sk.sub}</div></div>
        </div>
        <div class="skel-chev">▾</div>
      </div>
      <div class="skel-body">
        <div class="skel-divider">骨架模板</div>
        ${sk.frames.map(f=>`<div class="skel-frame" style="background:${sk.bg};color:${sk.txt}">${f}</div>`).join('')}
        <div class="skel-divider">原库例句</div>
        ${sk.examples.map(e=>`<div class="skel-ex">${e}</div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleSkel(i){
  document.getElementById('sc-'+i).classList.toggle('open');
}

      <button class="btn" onclick="fillNav(-1)">← 上一条</button>
      <span class="counter">${fillIdx+1} / ${fillItems.length}</span>
      <button class="btn" onclick="fillNav(1)">下一条 →</button>
    </div>`;
  document.getElementById('bi').addEventListener('keydown',e=>{if(e.key==='Enter')checkFill();});
  document.getElementById('bi').focus();
}

function checkFill(){
  const item=fillItems[fillIdx];
  const val=(document.getElementById('bi').value||'').trim().toLowerCase();
  const fb=document.getElementById('fbi');
  fb.classList.add('on');
  if(val===item.blank.toLowerCase()){
    fb.className='fb-box on ok'; fb.innerHTML='✓ 正确！<strong>'+item.blank+'</strong>';
  } else {
    fb.className='fb-box on no'; fb.innerHTML='正确答案：<strong>'+item.blank+'</strong>';
    document.getElementById('bi').value=item.blank;
  }
}

function fillNav(d){fillIdx=(fillIdx+d+fillItems.length)%fillItems.length;renderFill();}

function renderRecall(){
  const item=recallItems[recallIdx];
  document.getElementById('recall-prog').style.width=Math.round(recallIdx/recallItems.length*100)+'%';
  document.getElementById('recall-content').innerHTML=`
    <div class="pcard">
      <span class="topic-tag" style="${tagColors[item.tc]||tagColors.gray}">${item.topic}</span>
      <div class="question">${item.zh}</div>
      <div class="hint-txt">用法语说出来，再点「显示答案」对照</div>
      <textarea placeholder="在这里写出你的法语表达…"></textarea>
      <div class="btn-row">
        <button class="btn pri" onclick="document.getElementById('rev-r').classList.add('on')">显示答案</button>
      </div>
      <div class="rev-box" id="rev-r">
        <div class="rev-label">参考表达</div>
        <div class="rev-text">${item.fr}</div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn" onclick="recallNav(-1)">← 上一条</button>
      <span class="counter">${recallIdx+1} / ${recallItems.length}</span>
      <button class="btn" onclick="recallNav(1)">下一条 →</button>
    </div>`;
}

function recallNav(d){recallIdx=(recallIdx+d+recallItems.length)%recallItems.length;renderRecall();}

function renderExam(){
  document.getElementById('exam-content').innerHTML=examItems.map((ex,i)=>`
    <div class="exam-card ${ex.color}">
      <div class="exam-num">话题 ${i+1}</div>
      <div class="exam-topic">「${ex.topic}」</div>
      <ul class="points-list">
        ${ex.points.map(p=>`<li class="point-item"><div class="point-dot"></div><div class="point-text"><strong>${p.strong}</strong> — ${p.detail}</div></li>`).join('')}
      </ul>
      <textarea placeholder="假装你在考场，连续说1-2分钟……在这里写下或大声说出来"></textarea>
      <div class="btn-row">
        <button class="btn pri" onclick="this.nextElementSibling.classList.add('on')">显示关键零件提示</button>
        <div class="exam-rev" style="background:${ex.color.includes('blue')?'var(--blue-bg)':ex.color.includes('teal')?'var(--teal-bg)':ex.color.includes('purple')?'var(--purple-bg)':ex.color.includes('coral')?'var(--coral-bg)':ex.color.includes('amber')?'var(--amber-bg)':'var(--green-bg)'}">
          <div class="rev-label">练完后对照零件库</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.6">检查自己用了哪些零件：情感词、连接词、个人例子、结尾句。重点不是全对，是发现哪个零件还没内化。</div>
        </div>
      </div>
    </div>`).join('');
}

renderPieces();
</script>
</body>
</html>
