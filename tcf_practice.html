<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF 口语练习</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#f0ede6;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px 60px}

.header{text-align:center;margin-bottom:24px}
.header h1{font-family:"Fraunces",serif;font-size:22px;font-weight:300;color:#1a1a1a;margin-bottom:4px}
.header .sub{font-size:11px;color:#aaa;font-weight:300;letter-spacing:.06em}

/* mode tabs */
.mode-wrap{width:100%;max-width:560px;margin-bottom:14px}
.mode-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.mode-btn{padding:5px 11px;border-radius:6px;border:1px solid #ddd8d0;background:#fff;font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;color:#888;cursor:pointer;transition:all .1s;white-space:nowrap}
.mode-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* progress */
.progress-wrap{width:100%;max-width:560px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.bar{flex:1;height:2px;background:#ddd8d0;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:#1a1a1a;border-radius:2px;transition:width .4s ease}
.prog-label{font-size:11px;color:#bbb;white-space:nowrap}

/* card */
.card{width:100%;max-width:560px;background:#fff;border-radius:16px;border:1px solid #e4dfd6;overflow:hidden}

/* step1 */
.step1{padding:44px 44px 36px;text-align:center;cursor:pointer;transition:background .1s;border-bottom:1px solid #f5f2ee}
.step1:hover{background:#fdfcfa}
.cat-tag{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#c0b49a;margin-bottom:10px}
.zh-word{font-family:"Fraunces",serif;font-size:34px;font-weight:300;color:#1a1a1a;line-height:1.2}
.tap-hint{font-size:11px;color:#ccc;font-weight:300;letter-spacing:.06em;margin-top:14px}

/* step2 */
.step2{display:none}
.step2.show{display:block}

.fr-section{padding:22px 36px 18px;border-bottom:1px solid #f5f2ee}
.fr-main{font-family:"Fraunces",serif;font-size:20px;font-weight:300;color:#1a1a1a;line-height:1.45;margin-bottom:4px}
.fr-zh{font-size:12px;color:#b09070;font-weight:400}

/* translate prompt */
.prompt-section{padding:18px 36px;border-bottom:1px solid #f5f2ee;background:#faf8f4}
.prompt-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#c0b49a;margin-bottom:8px}
.prompt-zh{font-size:15px;color:#1a1a1a;line-height:1.6;font-weight:400}
.prompt-sub{font-size:11px;color:#bbb;margin-top:5px;font-weight:300}

/* ref section */
.ref-section{overflow:hidden;max-height:0;transition:max-height .35s ease,padding .35s ease;padding:0 36px}
.ref-section.show{max-height:400px;padding:20px 36px;border-top:1px solid #f5f2ee}
.ref-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#5a9a7a;margin-bottom:10px}
.ref-ex{margin-bottom:14px}
.ref-ex:last-child{margin-bottom:0}
.ref-fr{font-size:13px;font-style:italic;color:#1a1a1a;line-height:1.7;margin-bottom:3px}
.ref-zh{font-size:11px;color:#aaa;line-height:1.5;font-weight:300}

/* highlight */
.hl{background:#fff0c8;color:#8a6000;border-radius:3px;padding:1px 3px;font-style:normal;font-weight:500}

/* buttons */
.btn-row{padding:14px 20px;display:flex;gap:8px;border-top:1px solid #f0ede6}
.btn{flex:1;padding:11px;border-radius:8px;border:1px solid #e4dfd6;background:#fff;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:400;color:#3a3a3a;cursor:pointer;transition:all .1s;text-align:center}
.btn:hover{background:#f5f2ee;border-color:#ccc}
.btn:active{transform:scale(.97)}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.btn-primary:hover{background:#333;border-color:#333}
.btn-ref{background:#eef7f3;color:#2a7a5a;border-color:#c5e8d8;font-weight:500}
.btn-ref:hover{background:#dff0e8}

/* done */
.done{display:none;flex-direction:column;align-items:center;gap:16px;text-align:center;max-width:560px;margin-top:40px}
.done.show{display:flex}
.done-title{font-family:"Fraunces",serif;font-size:36px;font-weight:300;color:#1a1a1a}
.done-sub{font-size:13px;color:#aaa;font-weight:300}
.btn-restart{padding:12px 36px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-restart:hover{background:#333}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <h1>TCF 口语练习</h1>
  <div class="sub">看中文 · 想法语 · 翻译例句 · 看参考答案</div>
</div>

<div class="mode-wrap">
  <div class="mode-row" id="modeRow">
    <button class="mode-btn active" onclick="setMode('全部',this)">全部随机</button>
    <button class="mode-btn" onclick="setMode('数量·程度',this)">数量·程度</button>
    <button class="mode-btn" onclick="setMode('时间·频率',this)">时间·频率</button>
    <button class="mode-btn" onclick="setMode('动作·行为',this)">动作·行为</button>
    <button class="mode-btn" onclick="setMode('状态·感受',this)">状态·感受</button>
    <button class="mode-btn" onclick="setMode('因果·关系',this)">因果·关系</button>
    <button class="mode-btn" onclick="setMode('描述·形容',this)">描述·形容</button>
    <button class="mode-btn" onclick="setMode('高频搭配',this)">高频搭配</button>
    <button class="mode-btn" onclick="setMode('句型·结构',this)">句型·结构</button>
    <button class="mode-btn" onclick="setMode('固定·表达',this)">固定·表达</button>
    <button class="mode-btn" onclick="setMode('动词·搭配',this)">动词·搭配</button>
    <button class="mode-btn" onclick="setMode('名词·短语',this)">名词·短语</button>
    <button class="mode-btn" onclick="setMode('口语·表达',this)">口语·表达</button>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="bar"><div class="bar-fill" id="barFill"></div></div>
  <div class="prog-label" id="progLabel"></div>
</div>

<div class="card" id="mainCard">

  <div class="step1" id="step1" onclick="showFr()">
    <div class="cat-tag" id="catTag"></div>
    <div class="zh-word" id="zhWord"></div>
    <div class="tap-hint">在脑子里想法语，想好了再点</div>
  </div>

  <div class="step2" id="step2">

    <div class="fr-section">
      <div class="fr-main" id="frMain"></div>
      <div class="fr-zh" id="frZh"></div>
    </div>

    <div class="prompt-section">
      <div class="prompt-label">🎯 试着翻译这句话</div>
      <div class="prompt-zh" id="promptZh"></div>
      <div class="prompt-sub">用刚才的词组说出来，不用完美</div>
    </div>

    <div class="ref-section" id="refSection">
      <div class="ref-label">✓ 观点库参考例句</div>
      <div class="ref-ex">
        <div class="ref-fr" id="ref1Fr"></div>
        <div class="ref-zh" id="ref1Zh"></div>
      </div>
      <div class="ref-ex" id="ref2Wrap">
        <div class="ref-fr" id="ref2Fr"></div>
      </div>
    </div>

  </div>

  <div class="btn-row" id="btnRow">
    <button class="btn btn-primary" id="mainBtn" onclick="showFr()">我想好了，看法语</button>
  </div>

</div>

<div class="done" id="doneScreen">
  <div class="done-title">完成！</div>
  <div class="done-sub" id="doneSub"></div>
  <button class="btn-restart" onclick="restart()">再来一轮</button>
</div>

<script>
var CARDS = [
{"zh":"至少","fr":"au moins","cat":"数量·程度","ex1_fr":"Il faut au moins cinq ans pour maîtriser une langue étrangère.","ex1_zh":"至少需要五年才能掌握一门外语。","ex2_fr":"Un adulte doit passer au moins 5 ans pour atteindre le même niveau qu'un enfant.","hl":"au moins"},
{"zh":"越来越多的……","fr":"de plus en plus de + 名词","cat":"数量·程度","ex1_fr":"On voit de plus en plus de gens qui réussissent sans grandes études.","ex1_zh":"人们看到越来越多的人不靠名校也能成功。","ex2_fr":"De plus en plus de familles font le choix du télétravail.","hl":"de plus en plus"},
{"zh":"越来越少的……","fr":"de moins en moins de + 名词","cat":"数量·程度","ex1_fr":"Les gens écrivent de moins en moins de lettres.","ex1_zh":"人们写的信越来越少了。","ex2_fr":"Les jeunes ont de moins en moins de patience pour les échanges lents.","hl":"de moins en moins"},
{"zh":"差点（几乎但没发生）","fr":"faillir + 动词原形","cat":"数量·程度","ex1_fr":"Il a failli se perdre dans la ville.","ex1_zh":"他差点在城里迷路。","ex2_fr":"Comme il était seul, il a failli paniquer complètement.","hl":"a failli"},
{"zh":"如此……以至于……","fr":"tellement + 形容词 + que","cat":"数量·程度","ex1_fr":"Certaines applis sont tellement attractives que les parents n'ont plus besoin de surveiller.","ex1_zh":"有些应用如此吸引人，以至于父母不再需要盯着。","ex2_fr":"Le rythme est tellement intense qu'il est difficile de trouver des moments de calme.","hl":"tellement"},
{"zh":"……得多（加强比较级）","fr":"bien + 比较级","cat":"数量·程度","ex1_fr":"Une visite au zoo rend la leçon bien plus concrète.","ex1_zh":"参观动物园让课程具体得多。","ex2_fr":"Certains trajets sont bien meilleurs pour l'environnement en train qu'en avion.","hl":"bien plus"},
{"zh":"从小 / 从……起","fr":"dès l'enfance / dès + 名词","cat":"时间·频率","ex1_fr":"C'est vraiment mieux d'apprendre une langue dès l'enfance.","ex1_zh":"从小学一门语言真的更好。","ex2_fr":"Dès son arrivée à l'étranger, il a appris à se débrouiller.","hl":"dès"},
{"zh":"才刚刚开始","fr":"tout juste + 动词","cat":"时间·频率","ex1_fr":"Les jeunes qui commencent tout juste à travailler n'ont pas assez d'économies.","ex1_zh":"刚刚开始工作的年轻人没有足够的积蓄。","ex2_fr":"Elle vient tout juste de terminer ses études et cherche déjà un emploi.","hl":"tout juste"},
{"zh":"随时随地","fr":"à tout moment et n'importe où","cat":"时间·频率","ex1_fr":"Il suffit d'un téléphone pour regarder des cours à tout moment et n'importe où.","ex1_zh":"只需一部手机就能随时随地看在线课程。","ex2_fr":"Grâce au numérique, on peut travailler à tout moment et n'importe où.","hl":"à tout moment"},
{"zh":"在那一刻","fr":"à ce moment-là","cat":"时间·频率","ex1_fr":"À ce moment-là, il n'avait plus de Google Maps ni personne pour l'aider.","ex1_zh":"在那一刻，他既没有导航也没有人可以帮他。","ex2_fr":"À ce moment-là, il ne connaissait pas bien la ville et a failli se perdre.","hl":"À ce moment-là"},
{"zh":"如今、从此以后","fr":"désormais","cat":"时间·频率","ex1_fr":"Désormais, beaucoup d'entreprises acceptent le télétravail.","ex1_zh":"如今，很多企业接受远程办公。","ex2_fr":"Désormais, il est possible d'apprendre une langue sans quitter sa maison.","hl":"Désormais"},
{"zh":"靠……为生","fr":"vivre de + 名词","cat":"动作·行为","ex1_fr":"Beaucoup d'artistes ont du mal à vivre de leur travail.","ex1_zh":"很多艺术家很难靠自己的作品为生。","ex2_fr":"Il est difficile de vivre de sa passion dans le monde actuel.","hl":"vivre de"},
{"zh":"自己想办法应付","fr":"se débrouiller","cat":"动作·行为","ex1_fr":"Quand on est seul à l'étranger, sans personne sur qui compter, on apprend à se débrouiller.","ex1_zh":"一个人在国外，没有可以依靠的人，就学会了自己想办法。","ex2_fr":"On doit se débrouiller avec une langue qu'on ne maîtrise pas totalement.","hl":"se débrouiller"},
{"zh":"敢于做某事","fr":"oser + 动词原形","cat":"动作·行为","ex1_fr":"Les jeunes osent plus parler, même avec des fautes.","ex1_zh":"年轻人更敢于开口说话，即使会犯错。","ex2_fr":"Il faut oser discuter une instruction si elle semble inadaptée.","hl":"osent"},
{"zh":"依靠某人","fr":"compter sur quelqu'un","cat":"动作·行为","ex1_fr":"Sans personne sur qui compter, on apprend à être autonome.","ex1_zh":"没有可以依靠的人，就学会了独立。","ex2_fr":"Dans les moments difficiles, on a besoin de quelqu'un sur qui compter.","hl":"compter sur"},
{"zh":"花时间做某事","fr":"passer du temps à + 动词原形","cat":"动作·行为","ex1_fr":"On passe parfois plus de temps à discuter qu'à profiter.","ex1_zh":"我们有时花在讨论上的时间比享受还多。","ex2_fr":"Je passais du temps à jouer dehors avec mes cousins.","hl":"passer du temps à"},
{"zh":"下决心开始做某事","fr":"se mettre à + 动词原形","cat":"动作·行为","ex1_fr":"Beaucoup de gens se sont mis à cuisiner chez eux après la pandémie.","ex1_zh":"很多人在疫情后开始在家做饭。","ex2_fr":"Quand une langue devient vivante, on se met à l'apprendre sans effort.","hl":"se sont mis à"},
{"zh":"放弃……","fr":"renoncer à + 动词原形/名词","cat":"动作·行为","ex1_fr":"Il ne faut pas renoncer à ses traditions.","ex1_zh":"不应该放弃自己的传统。","ex2_fr":"Le plus important, ce n'est pas de renoncer à ses coutumes, mais de trouver un équilibre.","hl":"renoncer à"},
{"zh":"记得……","fr":"se souvenir de + 名词/que","cat":"动作·行为","ex1_fr":"Je me souviens très bien des moments où je jouais dehors avec mes cousins.","ex1_zh":"我还清楚记得在外面和表兄弟们玩耍的那些时光。","ex2_fr":"Je me souviens que je pêchais dans la rivière avec mes cousins.","hl":"me souviens"},
{"zh":"适应……","fr":"s'habituer à / s'adapter à","cat":"动作·行为","ex1_fr":"Les enfants s'habituent très vite à une nouvelle langue.","ex1_zh":"孩子们很快就习惯了一门新语言。","ex2_fr":"On doit s'adapter à une nouvelle culture, parfois même à une langue qu'on ne maîtrise pas.","hl":"s'habituent"},
{"zh":"只需……就能……","fr":"il suffit de + 名词/动词 + pour","cat":"动作·行为","ex1_fr":"Il suffit d'un téléphone pour regarder des cours en ligne.","ex1_zh":"只需一部手机就能看在线课程。","ex2_fr":"Il suffit de savoir tenir une petite conversation pour commencer à s'intégrer.","hl":"Il suffit"},
{"zh":"难以做某事","fr":"avoir du mal à + 动词原形","cat":"状态·感受","ex1_fr":"Certaines personnes ont du mal à rester motivées en télétravail.","ex1_zh":"有些人在远程办公时很难保持积极性。","ex2_fr":"Beaucoup d'artistes ont du mal à vivre de leur travail.","hl":"ont du mal à"},
{"zh":"感到自在、舒适","fr":"se sentir à l'aise","cat":"状态·感受","ex1_fr":"Avec des amis, on peut parler librement et se sentir à l'aise.","ex1_zh":"和朋友在一起，可以自由交流，感到自在。","ex2_fr":"La relation basée sur la confiance permet de se sentir à l'aise.","hl":"se sentir à l'aise"},
{"zh":"感到有用、被需要","fr":"se sentir utile","cat":"状态·感受","ex1_fr":"Continuer à travailler permet aux personnes âgées de se sentir utiles.","ex1_zh":"继续工作让老年人感到自己有用。","ex2_fr":"Le travail nous aide à nous sentir utiles dans la société.","hl":"se sentir utiles"},
{"zh":"为自己感到骄傲","fr":"être fier / fière de soi","cat":"状态·感受","ex1_fr":"Quand on finit une tâche difficile, on est fier de soi.","ex1_zh":"当完成一项艰难的任务时，我们会为自己感到骄傲。","ex2_fr":"Ce sentiment est aussi important que l'argent qu'on gagne.","hl":"fier de soi"},
{"zh":"承受压力","fr":"être sous pression","cat":"状态·感受","ex1_fr":"Lorsqu'un salarié est sous pression, savoir gérer ses émotions aide beaucoup.","ex1_zh":"当员工承受压力时，懂得管理情绪非常有帮助。","ex2_fr":"Les citadins ont tendance à être sous pression en permanence.","hl":"sous pression"},
{"zh":"习惯于……","fr":"avoir l'habitude de + 动词原形","cat":"状态·感受","ex1_fr":"En Chine, on a l'habitude de mettre tous les plats au milieu de la table.","ex1_zh":"在中国，我们习惯把所有菜放在桌子中间。","ex2_fr":"Le cerveau est déjà habitué à fonctionner d'une certaine façon.","hl":"a l'habitude de"},
{"zh":"容易分心","fr":"se laisser distraire","cat":"状态·感受","ex1_fr":"Certaines personnes se laissent facilement distraire quand elles travaillent chez elles.","ex1_zh":"有些人在家工作时容易分心。","ex2_fr":"Les enfants se laissent facilement distraire par les jeux vidéo.","hl":"se laissent facilement distraire"},
{"zh":"多亏了……（正面）","fr":"grâce à + 名词","cat":"因果·关系","ex1_fr":"Grâce au numérique, on peut garder des contacts sans se déplacer.","ex1_zh":"多亏数字技术，我们可以不出行也能保持联系。","ex2_fr":"Grâce à cela, ils ont une vie assez confortable.","hl":"Grâce à"},
{"zh":"因为……（负面原因）","fr":"à cause de + 名词","cat":"因果·关系","ex1_fr":"À cause de trop d'écrans, les enfants ont des troubles du sommeil.","ex1_zh":"由于过多使用屏幕，孩子们出现了睡眠障碍。","ex2_fr":"À cause de la mondialisation, la pression au travail augmente.","hl":"À cause de"},
{"zh":"这使得……（结果从句）","fr":"ce qui + 动词","cat":"因果·关系","ex1_fr":"Il n'y a pas de soutien immédiat, ce qui augmente le stress.","ex1_zh":"没有即时支持，这使得压力增加。","ex2_fr":"La culture devient un plaisir du quotidien, ce qui rend la société plus ouverte.","hl":"ce qui"},
{"zh":"这有助于……","fr":"cela contribue à / aide à + 动词原形","cat":"因果·关系","ex1_fr":"La nature contribue à réduire le stress et améliorer la concentration.","ex1_zh":"大自然有助于减少压力、提高专注力。","ex2_fr":"Une éducation égalitaire contribue à créer une société plus juste.","hl":"contribue à"},
{"zh":"这导致……","fr":"cela entraîne / provoque + 名词","cat":"因果·关系","ex1_fr":"Trop d'écrans entraîne des troubles du sommeil.","ex1_zh":"过多屏幕会导致睡眠障碍。","ex2_fr":"Le manque de contact humain provoque un sentiment d'isolement.","hl":"entraîne"},
{"zh":"宝贵的、珍贵的","fr":"précieux / précieuse","cat":"描述·形容","ex1_fr":"Les supérieurs âgés apportent une expérience précieuse et une vision stratégique.","ex1_zh":"年长上级带来宝贵的经验和战略性视角。","ex2_fr":"Leur expérience est un atout précieux pour les jeunes.","hl":"précieuse"},
{"zh":"过时的、不再适用的","fr":"dépassé(e)","cat":"描述·形容","ex1_fr":"Certaines méthodes traditionnelles sont dépassées face aux nouvelles technologies.","ex1_zh":"某些传统方法在新技术面前显得过时了。","ex2_fr":"Si un supérieur donne une instruction qui semble dépassée, on peut proposer une alternative.","hl":"dépassées"},
{"zh":"不可替代的","fr":"irremplaçable / indispensable","cat":"描述·形容","ex1_fr":"La lettre garde une valeur humaine irremplaçable.","ex1_zh":"书信保留着不可替代的人情价值。","ex2_fr":"Le livre papier garde une valeur unique : il permet de lire avec profondeur.","hl":"irremplaçable"},
{"zh":"均衡的、平衡的","fr":"équilibré(e)","cat":"描述·形容","ex1_fr":"Il faut utiliser les écrans de façon équilibrée.","ex1_zh":"必须以均衡的方式使用屏幕。","ex2_fr":"Ce n'est pas un usage équilibré des écrans.","hl":"équilibrée"},
{"zh":"在……方面","fr":"sur le plan de / en matière de","cat":"高频搭配","ex1_fr":"Voyager seul peut être difficile sur le plan psychologique.","ex1_zh":"独自旅行在心理层面可能比较困难。","ex2_fr":"Les progrès en matière de protection sociale sont encore insuffisants.","hl":"sur le plan"},
{"zh":"就……而言","fr":"pour ce qui est de / en ce qui concerne","cat":"高频搭配","ex1_fr":"Pour ce qui est de mon pays, les actions ne sont pas encore assez importantes.","ex1_zh":"就我的国家而言，措施还不够有力。","ex2_fr":"En ce qui concerne les enfants, il est important de limiter le temps d'écran.","hl":"Pour ce qui est de"},
{"zh":"保持联系","fr":"garder le contact / rester en contact avec","cat":"高频搭配","ex1_fr":"Grâce au numérique, on peut garder des contacts professionnels sans se déplacer.","ex1_zh":"借助数字技术，我们可以不出行也能保持职业联系。","ex2_fr":"Ces traditions permettent de garder un lien avec la famille.","hl":"garder des contacts"},
{"zh":"发挥重要作用","fr":"jouer un rôle important / essentiel","cat":"高频搭配","ex1_fr":"La langue joue un rôle essentiel dans l'intégration.","ex1_zh":"语言在融入社会中发挥重要作用。","ex2_fr":"L'école joue un rôle essentiel dans la construction d'une société plus juste.","hl":"joue un rôle essentiel"},

];

var mode="全部", queue=[], cur=0, stage=0;

function setMode(m,el){
  mode=m;
  document.querySelectorAll(".mode-btn").forEach(function(b){b.classList.remove("active")});
  el.classList.add("active");
  restart();
}

function buildQueue(){
  var pool = mode==="全部" ? CARDS.slice() : CARDS.filter(function(c){return c.cat===mode});
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t}
  return pool;
}

function highlight(text, hl){
  if(!hl) return text;
  // escape regex special chars
  var escaped = hl.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  var re = new RegExp("("+escaped+")","gi");
  return text.replace(re,'<span class="hl">$1</span>');
}

function render(){
  if(cur>=queue.length){showDone();return}
  stage=0;
  var c=queue[cur];

  document.getElementById("catTag").textContent=c.cat;
  document.getElementById("zhWord").textContent=c.zh;
  document.getElementById("frMain").textContent=c.fr;
  document.getElementById("frZh").textContent=c.zh;
  document.getElementById("promptZh").textContent=c.ex1_zh;
  document.getElementById("ref1Fr").innerHTML=highlight(c.ex1_fr,c.hl);
  document.getElementById("ref1Zh").textContent=c.ex1_zh;
  document.getElementById("ref2Fr").innerHTML=highlight(c.ex2_fr,c.hl);

  // reset
  document.getElementById("step1").style.cursor="pointer";
  document.getElementById("step1").onclick=showFr;
  document.getElementById("step2").classList.remove("show");
  document.getElementById("refSection").classList.remove("show");

  var btn=document.getElementById("mainBtn");
  btn.textContent="我想好了，看法语";
  btn.className="btn btn-primary";
  btn.onclick=showFr;

  document.getElementById("barFill").style.width=(cur/queue.length*100).toFixed(0)+"%";
  document.getElementById("progLabel").textContent=(cur+1)+" / "+queue.length;

  document.getElementById("mainCard").classList.remove("hidden");
  document.getElementById("progressWrap").classList.remove("hidden");
  document.getElementById("doneScreen").classList.remove("show");
}

function showFr(){
  if(stage!==0)return;
  stage=1;
  document.getElementById("step2").classList.add("show");
  document.getElementById("step1").style.cursor="default";
  document.getElementById("step1").onclick=null;
  var btn=document.getElementById("mainBtn");
  btn.textContent="看观点库例句";
  btn.className="btn btn-ref";
  btn.onclick=showRef;
}

function showRef(){
  if(stage!==1)return;
  stage=2;
  document.getElementById("refSection").classList.add("show");
  var btn=document.getElementById("mainBtn");
  btn.textContent="下一张 →";
  btn.className="btn btn-primary";
  btn.onclick=next;
}

function next(){cur++;render()}

function showDone(){
  document.getElementById("mainCard").classList.add("hidden");
  document.getElementById("progressWrap").classList.add("hidden");
  document.getElementById("doneSub").textContent="完成了 "+queue.length+" 张，今天练习结束";
  document.getElementById("doneScreen").classList.add("show");
}

function restart(){
  queue=buildQueue();cur=0;
  document.getElementById("mainCard").classList.remove("hidden");
  document.getElementById("progressWrap").classList.remove("hidden");
  document.getElementById("doneScreen").classList.remove("show");
  render();
}

restart();
</script>
